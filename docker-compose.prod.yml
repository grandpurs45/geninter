services:
  geninter:
    build: .
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.routers.geninter.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.geninter.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.geninter.tls=true"
      - "traefik.http.routers.geninter.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.geninter.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
